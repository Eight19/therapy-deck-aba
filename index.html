// ─── RESPONSIVE ──────────────────────────────────────────
function useW(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return w;
}

// ─── VOICE ───────────────────────────────────────────────
let _voice=null;
function _loadVoice(){
  const vs=window.speechSynthesis.getVoices();if(!vs.length)return;
  const pref=['Google US English','Samantha','Alex','Karen'];
  for(const n of pref){const v=vs.find(x=>x.name===n);if(v){_voice=v;return;}}
  _voice=vs.find(v=>v.lang==='en-US')||vs[0]||null;
}
if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=_loadVoice;_loadVoice();}
function speak(t,rate=0.85){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  if(_voice)u.voice=_voice;u.rate=rate;u.pitch=1;u.volume=1;
  window.speechSynthesis.speak(u);
}

// ─── IMAGE HELPERS ───────────────────────────────────────
const PX=id=>`https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop`;

// ─── COMPRESS IMAGE ──────────────────────────────────────
function compressImage(file,maxW=600){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.72));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ─── PHOTO CARD (with replace button) ────────────────────
function PhotoCard({item,size=120,color=T.indigo,onReplace,showLabel=true,onClick,active}){
  const [err,setErr]=useState(false);
  const fileRef=useRef(null);
  const sz=size;

  async function handleReplace(e){
    const file=e.target.files[0];
    if(!file||!onReplace)return;
    const compressed=await compressImage(file);
    onReplace(item,compressed);
    e.target.value='';
  }

  const src=item.imgSrc||item.img;
  let content;
  if(item.colorHex){
    content=<div style={{width:sz,height:sz,borderRadius:12,background:item.colorHex,border:'3px solid rgba(255,255,255,.15)'}}/>;
  } else if(item.shapeType){
    content=<ShapeViz type={item.shapeType} size={sz} color={color}/>;
  } else if(item.numVal!=null){
    content=<NumberViz n={item.numVal} size={sz}/>;
  } else if(item.syllables){
    content=(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
        {src&&!err&&<img src={src} alt={item.label} onError={()=>setErr(true)} style={{width:sz*.7,height:sz*.6,objectFit:'cover',borderRadius:10}}/>}
        <SyllableViz parts={item.syllables}/>
      </div>
    );
  } else if(item.isWord){
    content=(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
        {src&&!err?<img src={src} alt={item.label} onError={()=>setErr(true)} style={{width:sz*.75,height:sz*.6,objectFit:'cover',borderRadius:10}}/>:<div style={{width:sz*.75,height:sz*.55,borderRadius:10,background:`${color}20`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:sz*.18,opacity:.3}}>📝</span></div>}
        <div style={{background:`${color}25`,borderRadius:8,padding:'3px 12px',fontWeight:700,fontSize:Math.max(14,sz*.16),color:color,border:`1px solid ${color}40`}}>{item.label}</div>
      </div>
    );
  } else if(src&&!err){
    content=<img src={src} alt={item.label} onError={()=>setErr(true)} style={{width:sz,height:sz,objectFit:'cover',borderRadius:12,display:'block'}}/>;
  } else {
    content=<div style={{width:sz,height:sz,borderRadius:12,background:`${color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:sz*.38,fontWeight:900,color:color,border:`2px solid ${color}30`}}>{item.label.charAt(0).toUpperCase()}</div>;
  }

  return(
    <div style={{position:'relative',display:'inline-flex',flexDirection:'column',alignItems:'center',gap:6}}>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleReplace}/>
      <div onClick={onClick} style={{cursor:onClick?'pointer':'default',borderRadius:12,border:`2px solid ${active?color:T.border}`,overflow:'hidden',transition:'all .15s',transform:active?'scale(1.04)':'scale(1)',boxShadow:active?`0 0 20px ${color}50`:T.card}}>
        {content}
      </div>
      {onReplace&&(
        <button onClick={e=>{e.stopPropagation();fileRef.current&&fileRef.current.click();}}
          style={{position:'absolute',top:4,right:4,width:28,height:28,borderRadius:8,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,backdropFilter:'blur(4px)',border:`1px solid ${T.border}`,zIndex:2}}>📷</button>
      )}
      {showLabel&&<span style={{fontSize:Math.max(11,sz*.1),fontWeight:600,color:T.text,textAlign:'center',lineHeight:1.2,maxWidth:sz}}>{item.label}</span>}
    </div>
  );
}

    square:<rect x="6" y="6" width="88" height="88" rx="6" fill={c}/>,
    triangle:<polygon points="50,5 95,92 5,92" fill={c}/>,
    rectangle:<rect x="4" y="22" width="92" height="56" rx="6" fill={c}/>,
    oval:<ellipse cx="50" cy="50" rx="44" ry="28" fill={c}/>,
    diamond:<polygon points="50,4 96,50 50,96 4,50" fill={c}/>,
    star:<polygon points="50,5 61,35 93,35 68,57 79,91 50,70 21,91 32,57 7,35 39,35" fill={c}/>,
    heart:<path d="M50 85 C12 62 4 44 4 33 C4 17 16 7 28 7 C38 7 46 13 50 20 C54 13 62 7 72 7 C84 7 96 17 96 33 C96 44 88 62 50 85Z" fill={c}/>,
    pentagon:<polygon points="50,5 93,36 77,87 23,87 7,36" fill={c}/>,
    hexagon:<polygon points="89,27 89,73 50,96 11,73 11,27 50,4" fill={c}/>,
    octagon:<polygon points="92,67 67,92 33,92 8,67 8,33 33,8 67,8 92,33" fill={c}/>,
    trapezoid:<polygon points="18,82 82,82 68,18 32,18" fill={c}/>,
    cross:<path d="M36,4 L64,4 L64,36 L96,36 L96,64 L64,64 L64,96 L36,96 L36,64 L4,64 L4,36 L36,36Z" fill={c}/>,
    arrow:<polygon points="5,35 58,35 58,14 96,50 58,86 58,65 5,65" fill={c}/>,
    crescent:<path d="M60,10 A40,40 0 1,0 60,90 A28,32 0 1,1 60,10Z" fill={c}/>,
  };
  return <svg width={s} height={s} viewBox="0 0 100 100" style={{display:'block'}}>{shapes[type]||shapes.circle}</svg>;
}

// ─── NUMBER VIZ ──────────────────────────────────────────
function NumberViz({n,size}){
  const sz=size||120;
  const show=Math.min(n,20);
  const rows=[];
  for(let i=0;i<show;i+=10)rows.push(Math.min(10,show-i));
  const ds=Math.max(5,Math.floor(sz*0.07));
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:4}}>
      <div style={{fontSize:sz*.42,fontWeight:900,color:T.indigo,lineHeight:1}}>{n}</div>
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        {rows.map((rc,ri)=>(
          <div key={ri} style={{display:'flex',gap:3,justifyContent:'center'}}>
            {Array.from({length:rc}).map((_,i)=><div key={i} style={{width:ds,height:ds,borderRadius:'50%',background:T.indigo}}/>)}
          </div>
        ))}
        {n>20&&<p style={{fontSize:9,color:T.muted,textAlign:'center'}}>{n} total</p>}
      </div>
    </div>
  );
}

// ─── SYLLABLE VIZ ────────────────────────────────────────

  const cols=[T.rose,T.teal,T.purple,T.sky,T.amber];
  return(
    <div style={{display:'flex',gap:3,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
      {parts.map((p,i)=>(
        <React.Fragment key={i}>
          <div style={{background:`${cols[i%cols.length]}22`,borderRadius:8,padding:'4px 10px',fontWeight:800,fontSize:18,color:cols[i%cols.length],border:`1.5px solid ${cols[i%cols.length]}40`}}>{p}</div>
          {i<parts.length-1&&<span style={{color:T.muted,fontWeight:700}}>·</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

      <span style={{fontWeight:800,fontSize:tb?22:18,color:color||T.text,flex:1,letterSpacing:-.3}}>{title}</span>
      {right}
    </div>
  );
}

//  DTT — DISCRETE TRIAL TRAINING
// ═══════════════════════════════════════════════════════════
function DTT({onBack,uploads}){
  const tb=useW()>=768;
  const [catId,setCatId]=useState(null);
  const [items,setItems]=useState([]);
  const [idx,setIdx]=useState(0);
  const [shuffled,setShuffled]=useState(false);
  const [viewMode,setViewMode]=useState('cards'); // cards | grid
  const [showPhonics,setShowPhonics]=useState(false);

  const cat=CATS.find(c=>c.id===catId);

  function selectCat(c){
    setCatId(c.id);
    setItems(c.items);
    setIdx(0);setShuffled(false);
  }

  function shuffle(){setItems(it=>[...it].sort(()=>Math.random()-.5));setShuffled(true);setIdx(0);}
  function advance(dir){const n=(idx+dir+items.length)%items.length;setIdx(n);speak(items[n].label);}

  useEffect(()=>{if(cat&&items.length)speak(items[idx]?.label||'');},[idx,cat]);

  const imgSz=tb?160:120;

  if(!catId) return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>
      <Hdr title="🎴 DTT — Discrete Trials" onBack={onBack} color={T.indigo}/>
      <div style={{flex:1,overflowY:'auto',padding:tb?'20px 28px':14}}>
        <p style={{fontSize:12,color:T.muted,marginBottom:16,fontWeight:600}}>Choose a category to begin trials</p>
        <div style={{display:'grid',gridTemplateColumns:tb?'repeat(4,1fr)':'repeat(2,1fr)',gap:tb?12:10}}>
          {CATS.map((c,i)=>(
            <button key={c.id} onClick={()=>selectCat(c)} style={{background:T.card,borderRadius:14,padding:tb?'18px 14px':'14px 12px',display:'flex',flexDirection:'column',alignItems:'flex-start',gap:8,border:`1px solid ${T.border}`,animation:`fadeUp .3s ease ${i*.04}s both`,transition:'all .2s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=c.color}
              onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
              <span style={{fontSize:28}}>{c.emoji}</span>
              <div>
                <p style={{fontWeight:700,fontSize:14,color:T.text}}>{c.label}</p>
                <p style={{fontSize:11,color:T.muted}}>{c.items.length} items</p>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  return(

//  PECS / MANDING BOARD
// ═══════════════════════════════════════════════════════════
function PECS({onBack,uploads}){
  const tb=useW()>=768;
  const [board,setBoard]=useState([]);
  const [adding,setAdding]=useState(false);
  const [selected,setSelected]=useState([]);

  const allItems=[
    ...DEFAULT_ACTS.map(a=>({...a,type:'activity'})),
    ...CATS.find(c=>c.id==='foods').items.map(i=>({...i,type:'food',color:T.amber})),
    ...CATS.find(c=>c.id==='objects').items.slice(0,12).map(i=>({...i,type:'object',color:T.sky})),
    ...uploads.map(u=>({...u,type:'custom',color:T.purple})),
  ];

  function addToBoard(item){
    if(board.length>=16)return;
    if(!board.find(b=>b.id===item.id))setBoard(b=>[...b,item]);
    setAdding(false);
  }
  function speak_board(){
    const words=selected.map(s=>s.label).join(' ');

    <div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>

            <button onClick={()=>setAdding(a=>!a)} style={{background:adding?T.muted:`${T.purple}20`,borderRadius:10,padding:'8px 14px',fontWeight:700,fontSize:13,color:adding?'white':T.purple,border:`1px solid ${T.purple}40`}}>{adding?'Done':'+ Add'}</button>

        {/* Request strip */}
        {selected.length>0&&(
          <div style={{background:T.card,borderRadius:16,padding:'12px 16px',border:`1px solid ${T.purple}40`}}>
            <p style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:8}}>I WANT...</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

                  <span style={{fontWeight:700,fontSize:13,color:T.text}}>{s.label}</span>
                  <button onClick={()=>setSelected(sel=>sel.filter((_,j)=>j!==i))} style={{color:T.rose,fontWeight:700,fontSize:12}}>✕</button>
                </div>

            </div>
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button onClick={speak_board} style={{flex:1,background:T.purple,color:'white',borderRadius:12,padding:'12px 0',fontWeight:800,fontSize:16}}>🔊 I want {selected.map(s=>s.label).join(' & ')}</button>
              <button onClick={()=>setSelected([])} style={{background:T.card2,borderRadius:12,padding:'12px 16px',fontWeight:700,fontSize:14,color:T.muted,border:`1px solid ${T.border}`}}>✕</button>
            </div>
          </div>
        )}

        {/* Board */}
        {!adding&&(
          <>
            <p style={{fontSize:12,color:T.muted,fontWeight:600}}>Tap a card to request it</p>
            {board.length===0?(
              <div style={{background:T.card,borderRadius:16,padding:'36px 20px',textAlign:'center',border:`1px dashed ${T.border}`}}>
                <p style={{fontSize:32,marginBottom:10}}>🔄</p>
                <p style={{fontWeight:700,fontSize:15,color:T.muted}}>Board is empty</p>
                <p style={{fontSize:12,color:T.dimmed,marginTop:6}}>Tap "+ Add" to add reinforcers and items</p>
              </div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:tb?'repeat(4,1fr)':'repeat(3,1fr)',gap:tb?14:10}}>
                {board.map((item,i)=>{
                  const isSel=selected.find(s=>s.id===item.id);
                  return(
                    <button key={item.id} onClick={()=>{speak(item.label);setSelected(s=>isSel?s.filter(x=>x.id!==item.id):[...s,item]);}}
                      style={{background:isSel?`${T.purple}20`:T.card,borderRadius:14,padding:tb?'14px 10px':'12px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:7,border:`2px solid ${isSel?T.purple:T.border}`,transition:'all .18s',position:'relative'}}>
                      <PhotoCard item={item} size={tb?90:72} color={item.color||T.purple} showLabel={false}
                        onReplace={(it,src)=>{const upd=[...board];upd[i]={...it,imgSrc:src};setBoard(upd);}}/>

                  onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
                  {item.imgSrc?<img src={item.imgSrc} alt={item.label} style={{width:44,height:44,borderRadius:8,objectFit:'cover'}}/>:<span style={{fontSize:28}}>{item.emoji}</span>}
                  <span style={{fontWeight:600,fontSize:11,color:T.text,textAlign:'center',lineHeight:1.2}}>{item.label}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  VI TIMER (Variable Interval — Pretty Random style)
// ═══════════════════════════════════════════════════════════
function VITimer({onBack}){
  const tb=useW()>=768;
  const [viValue,setViValue]=useState(3); // avg minutes
  const [running,setRunning]=useState(false);
  const [nextSec,setNextSec]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [history,setHistory]=useState([]);
  const [deliveries,setDeliveries]=useState(0);
  const [reinforcer,setReinforcer]=useState('Praise');
  const ref=useRef(null);const tickRef=useRef(null);

  function randInterval(){
    // True VI: random intervals averaging viValue minutes
    // Uses exponential distribution approximation
    const avg=viValue*60;
    const min=avg*.25;const max=avg*2.5;
    return Math.round(Math.random()*(max-min)+min);
  }

  function start(){
    const next=randInterval();
    setNextSec(next);setRunning(true);setElapsed(0);
    speak(`Variable interval ${viValue} started. Deliver ${reinforcer} when timer pings.`);
  }

  function stop(){setRunning(false);clearTimeout(ref.current);clearInterval(tickRef.current);}

  useEffect(()=>{
    if(!running||nextSec===null)return;
    clearInterval(tickRef.current);
    tickRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    clearTimeout(ref.current);
    ref.current=setTimeout(()=>{
      speak(`Deliver ${reinforcer} now!`);
      const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      setHistory(h=>[{time:now,interval:nextSec},...h.slice(0,9)]);
      setDeliveries(d=>d+1);
      setElapsed(0);
      const next=randInterval();
      setNextSec(next);
      ref.current=null;
    },nextSec*1000);
    return()=>{clearTimeout(ref.current);clearInterval(tickRef.current);};
  },[running,nextSec]);

  function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
  const pct=nextSec?Math.min(elapsed/nextSec,1):0;
  const R=tb?80:65;const circ=2*Math.PI*R;const sz=(R+20)*2;
  const color=pct<.7?T.green:pct<.9?T.amber:T.rose;

  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>
      <Hdr title="⏱️ VI Timer" onBack={onBack} color={T.green}/>
      <div style={{flex:1,overflowY:'auto',padding:tb?'24px 32px':16,display:'flex',flexDirection:'column',alignItems:'center',gap:tb?24:16}}>

        {/* VI selector */}
        <div style={{background:T.card,borderRadius:20,padding:tb?'20px 28px':'16px',width:'100%',maxWidth:560,border:`1px solid ${T.border}`}}>
          <p style={{fontSize:11,fontWeight:700,color:T.muted,marginBottom:14,letterSpacing:1.5,textTransform:'uppercase'}}>Variable Interval Setting</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:16}}>
            {[1,2,3,5,10].map(v=>(
              <button key={v} onClick={()=>!running&&setViValue(v)} style={{background:viValue===v?T.green:T.card2,color:viValue===v?'white':T.muted,borderRadius:10,padding:'10px 0',fontWeight:800,fontSize:tb?16:14,border:`1px solid ${viValue===v?T.green:T.border}`,transition:'all .15s'}}>VI {v}</button>
            ))}
          </div>
          <p style={{fontSize:12,color:T.muted,lineHeight:1.5}}>VI {viValue} = reinforcement delivered on average every <strong style={{color:T.text}}>{viValue} minute{viValue>1?'s':''}</strong>, but randomly (range: {Math.round(viValue*.25)}–{Math.round(viValue*2.5)} min)</p>
        </div>

        {/* Reinforcer */}
        <div style={{background:T.card,borderRadius:20,padding:tb?'16px 28px':'14px 16px',width:'100%',maxWidth:560,border:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:11,fontWeight:700,color:T.muted,whiteSpace:'nowrap',letterSpacing:1,textTransform:'uppercase'}}>Reinforcer</span>

        </div>

        {/* Timer ring */}
        <div style={{position:'relative',width:sz,height:sz}}>
          <svg width={sz} height={sz}>
            <circle cx={sz/2} cy={sz/2} r={R} fill={`${color}10`} stroke={`${color}22`} strokeWidth={tb?16:13}/>
            <circle cx={sz/2} cy={sz/2} r={R} fill="none" stroke={color} strokeWidth={tb?16:13} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform={`rotate(-90 ${sz/2} ${sz/2})`} style={{transition:'stroke-dashoffset 1s linear,stroke .5s'}}/>
          </svg>
          <div style={{position:'absolute',top:0,left:0,width:sz,height:sz,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
            {running&&nextSec?(
              <>
                <p style={{fontSize:tb?50:40,fontWeight:900,color:T.text,fontVariantNumeric:'tabular-nums'}}>{fmt(Math.max(0,nextSec-elapsed))}</p>
                <p style={{fontSize:12,color:T.muted,fontWeight:600}}>until reinforcement</p>
              </>
            ):(
              <>
                <p style={{fontSize:tb?32:26,fontWeight:900,color:T.muted}}>VI {viValue}</p>
                <p style={{fontSize:12,color:T.dimmed}}>Ready</p>
              </>
            )}
          </div>
        </div>

        {/* Controls */}
        <div style={{display:'flex',gap:12}}>
          {!running?(
            <button onClick={start} style={{background:`linear-gradient(135deg,${T.green},${T.teal})`,color:'white',borderRadius:18,padding:tb?'16px 48px':'14px 36px',fontWeight:900,fontSize:tb?20:17,boxShadow:`0 4px 20px ${T.green}40`}}>▶ Start VI {viValue}</button>

            <button onClick={stop} style={{background:T.rose,color:'white',borderRadius:18,padding:tb?'16px 48px':'14px 36px',fontWeight:900,fontSize:tb?20:17}}>⏹ Stop</button>
          )}
          {!running&&<button onClick={()=>{setDeliveries(0);setHistory([]);setElapsed(0);setNextSec(null);}} style={{background:T.card,borderRadius:18,padding:tb?'16px 20px':'14px 18px',fontWeight:700,fontSize:tb?18:16,border:`1px solid ${T.border}`,color:T.muted}}>↺</button>}
        </div>

        {/* Stats + history */}
        <div style={{background:T.card,borderRadius:20,padding:tb?'18px 28px':'14px 16px',width:'100%',maxWidth:560,border:`1px solid ${T.border}`}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
            <div style={{textAlign:'center'}}>
              <p style={{fontSize:28,fontWeight:900,color:T.green}}>{deliveries}</p>
              <p style={{fontSize:12,color:T.muted,fontWeight:600}}>Deliveries</p>
            </div>
            <div style={{textAlign:'center'}}>

            </div>
            <div style={{textAlign:'center'}}>

              <p style={{fontSize:12,color:T.muted,fontWeight:600}}>Current</p>

                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

//  CHOICE BOARD
// ═══════════════════════════════════════════════════════════
function ChoiceBoard({onBack,uploads}){
  const tb=useW()>=768;
  const [board,setBoard]=useState([]);
  const [adding,setAdding]=useState(false);
  const [cols,setCols]=useState(3);

  const candidates=[
    ...DEFAULT_ACTS,
    ...CATS.find(c=>c.id==='objects').items.slice(0,10).map(i=>({...i,color:T.sky})),
    ...CATS.find(c=>c.id==='foods').items.slice(0,10).map(i=>({...i,color:T.amber})),
    ...uploads.map(u=>({...u,color:T.purple})),
  ];

  function addItem(item){if(!board.find(b=>b.id===item.id)&&board.length<12)setBoard(b=>[...b,item]);}

  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>
      <Hdr title="🎯 Choice Board" onBack={onBack} color={T.orange}
        right={
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{display:'flex',background:T.card2,borderRadius:10,padding:3,gap:2}}>
              {[2,3,4].map(n=>(
                <button key={n} onClick={()=>setCols(n)} style={{background:cols===n?T.orange:'transparent',color:cols===n?'white':T.muted,borderRadius:7,padding:'5px 10px',fontWeight:700,fontSize:12,transition:'all .2s'}}>{n}</button>
              ))}
            </div>
            <button onClick={()=>setAdding(a=>!a)} style={{background:adding?T.muted:`${T.orange}20`,borderRadius:10,padding:'8px 14px',fontWeight:700,fontSize:13,color:adding?'white':T.orange,border:`1px solid ${T.orange}40`}}>{adding?'Done':'+ Add'}</button>
          </div>
        }/>
      <div style={{flex:1,overflowY:'auto',padding:tb?'16px 24px':12,display:'flex',flexDirection:'column',gap:14}}>
        {!adding&&(
          <>
            <p style={{fontSize:12,color:T.muted,fontWeight:600}}>Tap any item to speak it · 📷 to replace photo</p>
            {board.length===0?(
              <div style={{background:T.card,borderRadius:16,padding:'36px 20px',textAlign:'center',border:`1px dashed ${T.border}`}}>
                <p style={{fontSize:32,marginBottom:10}}>🎯</p>
                <p style={{fontWeight:700,fontSize:15,color:T.muted}}>Board is empty</p>
                <p style={{fontSize:12,color:T.dimmed,marginTop:6}}>Tap "+ Add" to add choices</p>
              </div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:tb?14:10}}>
                {board.map((item,i)=>{
                  const sz=tb?130:100;
                  return(
                    <div key={item.id} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,position:'relative',animation:`fadeUp .25s ease ${i*.04}s both`}}>
                      <PhotoCard item={item} size={sz} color={item.color||T.orange}
                        onClick={()=>speak(item.label)}
                        onReplace={(it,src)=>{const upd=[...board];upd[i]={...it,imgSrc:src};setBoard(upd);}}
                        showLabel={true}/>
                      <button onClick={()=>setBoard(b=>b.filter(b=>b.id!==item.id))} style={{position:'absolute',top:4,left:4,width:20,height:20,borderRadius:6,background:'rgba(0,0,0,.7)',fontSize:10,color:T.muted}}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}

        {adding&&(
          <div>
            <p style={{fontSize:12,color:T.muted,fontWeight:600,marginBottom:12}}>Choose items to add ({board.length}/12)</p>
            <div style={{display:'grid',gridTemplateColumns:tb?'repeat(5,1fr)':'repeat(3,1fr)',gap:10}}>
              {candidates.filter(i=>!board.find(b=>b.id===i.id)).slice(0,40).map((item,i)=>(
                <button key={item.id} onClick={()=>addItem(item)} style={{background:T.card,borderRadius:12,padding:'12px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,border:`1px solid ${T.border}`,animation:`fadeUp .2s ease ${i*.02}s both`,transition:'all .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=T.orange}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
                  {item.imgSrc?<img src={item.imgSrc} alt={item.label} style={{width:44,height:44,borderRadius:8,objectFit:'cover'}}/>:<span style={{fontSize:28}}>{item.emoji}</span>}
                  <span style={{fontWeight:600,fontSize:11,color:T.text,textAlign:'center',lineHeight:1.2}}>{item.label}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── BOOK READER ─────────────────────────────────────────
function BookReader({book,onClose}){
  const [page,setPage]=useState(0);
  const [autoRead,setAutoRead]=useState(false);
  const [fontSize,setFontSize]=useState(20);
  const tb=useW()>=768;
  const autoRef=useRef(null);

  function readPage(){speak(book.pages[page],0.78);}
  function advance(dir){
    const next=page+dir;
    if(next<0||next>=book.pages.length)return;
    setPage(next);
    window.speechSynthesis.cancel();
    if(autoRead)setTimeout(()=>speak(book.pages[next],0.78),400);
  }
  useEffect(()=>{if(autoRead)readPage();},[autoRead,page]);
  useEffect(()=>{return()=>window.speechSynthesis.cancel();},[]);

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:T.bg}}>
      <div style={{display:'flex',alignItems:'center',padding:tb?'14px 24px':'12px 16px',background:T.card,borderBottom:`1px solid ${T.border}`,gap:12}}>
        <button onClick={()=>{window.speechSynthesis.cancel();onClose();}} style={{background:T.card2,borderRadius:10,padding:'8px 14px',fontWeight:700,fontSize:13,color:T.muted,border:`1px solid ${T.border}`}}>← Back</button>
        <span style={{fontWeight:700,fontSize:tb?16:14,color:T.text,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{book.emoji} {book.title}</span>
        <span style={{fontSize:13,color:T.muted,fontWeight:600}}>{page+1}/{book.pages.length}</span>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:tb?'32px 48px':'20px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:tb?32:20}}>
        <div style={{background:T.card,borderRadius:24,padding:tb?'40px 48px':'24px 20px',maxWidth:680,width:'100%',border:`1px solid ${T.border}`,boxShadow:`0 8px 40px rgba(0,0,0,.3)`,minHeight:tb?240:180,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .3s ease'}}>
          <p style={{fontSize:fontSize,color:T.text,lineHeight:1.7,textAlign:'center',fontWeight:500,whiteSpace:'pre-line'}}>{book.pages[page]}</p>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
          <button onClick={readPage} style={{background:T.indigo,color:'white',borderRadius:12,padding:tb?'12px 24px':'10px 18px',fontWeight:700,fontSize:tb?15:13}}>🔊 Read Aloud</button>
          <button onClick={()=>setAutoRead(a=>!a)} style={{background:autoRead?T.teal:`${T.teal}20`,color:autoRead?'white':T.teal,borderRadius:12,padding:tb?'12px 22px':'10px 16px',fontWeight:700,fontSize:tb?14:12,border:`1px solid ${T.teal}40`}}>{autoRead?'⏸ Auto Off':'▶ Auto Read'}</button>
          <button onClick={()=>setFontSize(f=>Math.min(f+2,30))} style={{background:T.card2,borderRadius:12,padding:tb?'12px 16px':'10px 14px',fontWeight:700,fontSize:14,color:T.muted,border:`1px solid ${T.border}`}}>A+</button>
          <button onClick={()=>setFontSize(f=>Math.max(f-2,14))} style={{background:T.card2,borderRadius:12,padding:tb?'12px 16px':'10px 14px',fontWeight:700,fontSize:14,color:T.muted,border:`1px solid ${T.border}`}}>A-</button>
        </div>
      </div>
      <div style={{display:'flex',gap:12,padding:tb?'16px 48px':'12px 16px',background:T.card,borderTop:`1px solid ${T.border}`}}>
        <button onClick={()=>advance(-1)} disabled={page===0} style={{flex:1,background:page===0?T.card2:T.card,borderRadius:14,padding:tb?'16px 0':'14px 0',fontWeight:800,fontSize:22,color:page===0?T.dimmed:T.text,border:`1px solid ${T.border}`}}>←</button>
        <button onClick={()=>advance(1)} disabled={page>=book.pages.length-1} style={{flex:1,background:page>=book.pages.length-1?T.card2:T.indigo,color:'white',borderRadius:14,padding:tb?'16px 0':'14px 0',fontWeight:800,fontSize:22,opacity:page>=book.pages.length-1?.5:1}}>→</button>
      </div>
    </div>
  );
}

function TimerTool({onBack}){
  const tb=useW()>=768;
  const [tSec,setTSec]=useState(300);const [tLeft,setTLeft]=useState(300);const [running,setRunning]=useState(false);
  const [label,setLabel]=useState('Session Timer');
  const ref=useRef(null);
  useEffect(()=>{if(running&&tLeft>0){ref.current=setTimeout(()=>setTLeft(t=>t-1),1000);}else if(tLeft===0&&running){setRunning(false);speak('Time is up!');}return()=>clearTimeout(ref.current);},[running,tLeft]);
  const pct=tLeft/tSec;const R=tb?88:70;const circ=2*Math.PI*R;const sz=(R+20)*2;
  const color=pct>.5?T.green:pct>.2?T.amber:T.rose;
  function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
  const PRESETS=[{l:'1m',s:60},{l:'2m',s:120},{l:'3m',s:180},{l:'5m',s:300},{l:'10m',s:600},{l:'15m',s:900},{l:'20m',s:1200},{l:'30m',s:1800}];
  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column'}}>
      <Hdr title="⏱️ Timer" onBack={onBack} color={T.amber}/>
      <div style={{flex:1,overflowY:'auto',padding:tb?'28px 40px':16,display:'flex',flexDirection:'column',alignItems:'center',gap:tb?24:16}}>
        <input value={label} onChange={e=>setLabel(e.target.value)} style={{width:'100%',maxWidth:400,textAlign:'center',background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'12px 16px',fontSize:tb?18:16,fontWeight:700,color:T.text,outline:'none'}}/>
        <div style={{position:'relative',width:sz,height:sz}}>
          <svg width={sz} height={sz}>
            <circle cx={sz/2} cy={sz/2} r={R} fill={`${color}08`} stroke={`${color}20`} strokeWidth={tb?18:14}/>
            <circle cx={sz/2} cy={sz/2} r={R} fill="none" stroke={color} strokeWidth={tb?18:14} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform={`rotate(-90 ${sz/2} ${sz/2})`} style={{transition:'stroke-dashoffset 1s linear,stroke .5s ease'}}/>
          </svg>
          <div style={{position:'absolute',top:0,left:0,width:sz,height:sz,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
            <span style={{fontSize:tb?54:42,fontWeight:900,color:T.text,fontVariantNumeric:'tabular-nums'}}>{fmt(tLeft)}</span>
            <span style={{fontSize:12,color:T.muted,fontWeight:600}}>{label}</span>
          </div>
        </div>
        <div style={{display:'flex',gap:12}}>
          <button onClick={()=>setRunning(r=>!r)} style={{background:running?T.rose:color,color:'white',borderRadius:18,padding:tb?'16px 44px':'14px 34px',fontWeight:900,fontSize:tb?20:17,minWidth:160}}>{running?'⏸ Pause':'▶ Start'}</button>
          <button onClick={()=>{setTLeft(tSec);setRunning(false);}} style={{background:T.card,borderRadius:18,padding:tb?'16px 22px':'14px 18px',fontWeight:700,fontSize:tb?20:17,border:`1px solid ${T.border}`,color:T.muted}}>↺</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,width:'100%',maxWidth:480}}>
          {PRESETS.map(p=>(
            <button key={p.s} onClick={()=>{setTSec(p.s);setTLeft(p.s);setRunning(false);}} style={{background:tSec===p.s?T.amber:T.card,color:tSec===p.s?'white':T.muted,borderRadius:12,padding:tb?'12px 0':'10px 0',fontWeight:800,fontSize:tb?15:13,border:`1px solid ${tSec===p.s?T.amber:T.border}`,transition:'all .15s'}}>{p.l}</button>
          ))}
        </div>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

function MyPhotos({onBack,uploads,setUploads}){
  const tb=useW()>=768;
  const [tab,setTab]=useState('all');
  const galleryRef=useRef(null);const cameraRef=useRef(null);
  const [editing,setEditing]=useState(null);const [editLabel,setEditLabel]=useState('');const [editCat,setEditCat]=useState('');
  const [storageWarn,setStorageWarn]=useState(false);

  const CATS_TAGS=['Activity','Routine','Place','Person','Room','Item','Food','Other'];
  const tabFilter={all:null,activities:['Activity','Routine'],places:['Place','Room'],people:['Person']};
  const visible=tabFilter[tab]?uploads.filter(u=>tabFilter[tab].includes(u.cat)):uploads;

  async function onFilesChange(e,defaultCat){
    const files=Array.from(e.target.files);if(!files.length)return;
    const newItems=await Promise.all(files.map(async f=>{
      const compressed=await compressImage(f);
      return{id:`${Date.now()}-${Math.random()}`,label:f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' '),imgSrc:compressed,cat:defaultCat,date:new Date().toLocaleDateString()};
    }));
    const updated=[...newItems,...uploads];
    try{localStorage.setItem(LS_PHOTOS,JSON.stringify(updated));setUploads(updated);}
    catch(err){setStorageWarn(true);setUploads(u=>[...newItems,...u]);}
    if(newItems.length===1){setEditing(newItems[0]);setEditLabel(newItems[0].label);setEditCat(newItems[0].cat);}
    e.target.value='';
  }
  function saveEdit(){
    setUploads(current=>{
      const upd=current.map(x=>x.id===editing.id?{...x,label:editLabel,cat:editCat}:x);
      try{localStorage.setItem(LS_PHOTOS,JSON.stringify(upd));}catch(e){}
      return upd;
    });
    setEditing(null);
  }
  function deleteItem(){
    setUploads(current=>{
      const upd=current.filter(x=>x.id!==editing.id);
      try{localStorage.setItem(LS_PHOTOS,JSON.stringify(upd));}catch(e){}
      return upd;
    });
    setEditing(null);
  }

  return(
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',position:'relative'}}>
      <Hdr title="📷 My Photos" onBack={onBack} color={T.rose}/>
      <input ref={galleryRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>onFilesChange(e,'Activity')}/>
      <input ref={cameraRef}  type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>onFilesChange(e,'Activity')}/>

      {/* Upload buttons */}
      <div style={{display:'flex',gap:10,padding:tb?'12px 24px':'10px 14px',background:T.card,borderBottom:`1px solid ${T.border}`}}>
        <button onClick={()=>cameraRef.current&&cameraRef.current.click()} style={{flex:1,background:T.rose,color:'white',borderRadius:12,padding:tb?'12px 0':'10px 0',fontWeight:700,fontSize:tb?15:13,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>📸 Take Photo</button>
        <button onClick={()=>galleryRef.current&&galleryRef.current.click()} style={{flex:1,background:T.card2,color:T.text,borderRadius:12,padding:tb?'12px 0':'10px 0',fontWeight:700,fontSize:tb?15:13,display:'flex',alignItems:'center',justifyContent:'center',gap:8,border:`1px solid ${T.border}`}}>🖼️ Choose Gallery</button>
      </div>

      {/* Filter tabs */}
      <div style={{display:'flex',background:T.card,borderBottom:`1px solid ${T.border}`,padding:'6px 14px',gap:6}}>
        {[{id:'all',label:`All (${uploads.length})`},{id:'activities',label:'Activities'},{id:'places',label:'Places'},{id:'people',label:'People'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'7px 14px',borderRadius:8,fontWeight:700,fontSize:12,background:tab===t.id?T.rose:'transparent',color:tab===t.id?'white':T.muted,transition:'all .2s'}}>{t.label}</button>
        ))}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:tb?'16px 24px':12}}>
        {storageWarn&&(
          <div style={{background:`${T.amber}18`,borderRadius:12,padding:'12px 16px',border:`1px solid ${T.amber}40`,marginBottom:12}}>
            <p style={{fontSize:13,fontWeight:700,color:T.amber}}>⚠️ Storage nearly full — delete some photos to free space</p>
          </div>
        )}

        {/* Tips */}
        <div style={{background:T.card,borderRadius:14,padding:'12px 16px',border:`1px solid ${T.indigo}30`,marginBottom:16}}>
          <p style={{fontSize:12,color:T.muted,lineHeight:1.6}}>📷 <strong style={{color:T.text}}>Take Photo</strong> opens the camera on phones & tablets. Photos tagged as <strong style={{color:T.text}}>Activity, Routine, Place, or Person</strong> appear in Visual Schedules and PECS boards.</p>
        </div>

        {visible.length===0?(
          <div style={{background:T.card,borderRadius:16,padding:'40px 20px',textAlign:'center',border:`1px dashed ${T.border}`}}>
            <p style={{fontSize:36,marginBottom:12}}>📭</p>
            <p style={{fontWeight:700,fontSize:15,color:T.muted}}>No photos yet</p>
            <p style={{fontSize:12,color:T.dimmed,marginTop:6}}>Add photos of session rooms, familiar places, people, and activities to personalize all programs</p>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {visible.map(item=>(
              <div key={item.id} style={{background:T.card,borderRadius:16,padding:tb?'12px 16px':'10px 14px',display:'flex',alignItems:'center',gap:12,border:`1px solid ${T.border}`,animation:'fadeUp .3s ease'}}>
                <div style={{width:tb?58:50,height:tb?58:50,borderRadius:12,overflow:'hidden',flexShrink:0,background:`${T.rose}20`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {item.imgSrc?<img src={item.imgSrc} alt={item.label} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:24}}>📸</span>}
                </div>

              </div>
            ))}

        )}
        <div style={{height:8}}/>
      </div>

      {/* Edit modal */}
      {editing&&(
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.7)',display:'flex',alignItems:'flex-end',zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setEditing(null);}}>
          <div style={{background:T.card,borderRadius:'24px 24px 0 0',padding:tb?'28px 32px':'22px 20px',width:'100%',display:'flex',flexDirection:'column',gap:16,animation:'slideUp .3s ease',maxHeight:'85vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <p style={{fontWeight:800,fontSize:tb?20:18,color:T.text}}>Edit Photo</p>
              <button onClick={()=>setEditing(null)} style={{fontSize:22,color:T.muted}}>✕</button>
            </div>
            {editing.imgSrc&&<div style={{display:'flex',justifyContent:'center'}}><img src={editing.imgSrc} alt="" style={{width:tb?120:90,height:tb?120:90,borderRadius:16,objectFit:'cover',border:`1px solid ${T.border}`}}/></div>}
            <div>
              <p style={{fontSize:11,fontWeight:700,color:T.muted,marginBottom:7,letterSpacing:1,textTransform:'uppercase'}}>Name / Label</p>
              <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} placeholder="e.g. Session Room, Snack Time" style={{width:'100%',background:T.card2,border:`1px solid ${T.rose}50`,borderRadius:12,padding:'12px 16px',fontSize:15,fontWeight:600,color:T.text,outline:'none'}}/>
            </div>
            <div>
              <p style={{fontSize:11,fontWeight:700,color:T.muted,marginBottom:9,letterSpacing:1,textTransform:'uppercase'}}>Category</p>
              <p style={{fontSize:12,color:T.dimmed,marginBottom:8}}>Tag as <strong style={{color:T.text}}>Activity, Routine, Place, or Person</strong> to use in schedules & boards</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {CATS_TAGS.map(ct=>(
                  <button key={ct} onClick={()=>setEditCat(ct)} style={{background:editCat===ct?T.rose:T.card2,color:editCat===ct?'white':T.muted,borderRadius:10,padding:'9px 4px',fontWeight:700,fontSize:tb?13:11,border:`1px solid ${editCat===ct?T.rose:T.border}`,transition:'all .15s'}}>{ct}</button>

              <button onClick={saveEdit} style={{flex:1,background:T.rose,color:'white',borderRadius:12,padding:'13px 0',fontWeight:800,fontSize:16}}>Save ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [view,setView]=useState('splash');
  const [vdata,setVdata]=useState(null);
  const [hist,setHist]=useState([]);
  const [uploads,setUploads]=useState(()=>{
    try{const s=localStorage.getItem(LS_PHOTOS);return s?JSON.parse(s):[];}
    catch(e){return[];}
  });

  function nav(v,d=null){setHist(h=>[...h,{view,data:vdata}]);setView(v);setVdata(d);}
  function back(){if(!hist.length)return;const p=hist[hist.length-1];setHist(h=>h.slice(0,-1));setView(p.view);setVdata(p.data);}

  const props={onBack:back,uploads,setUploads};

  return(
    <div style={{height:'100dvh',overflow:'hidden',background:T.bg,color:T.text}}>
      {view==='splash'     &&<Splash onEnter={()=>{setView('dash');}}/>}
      {view==='dash'       &&<Dashboard onNav={nav} uploads={uploads}/>}
      {view==='dtt'        &&<DTT {...props} onBack={back}/>}
      {view==='receptive'  &&<ReceptiveID {...props}/>}
      {view==='tacting'    &&<Tacting onBack={back}/>}
      {view==='schedule'   &&<Schedule {...props}/>}
      {view==='pecs'       &&<PECS {...props}/>}
      {view==='imitation'  &&<Imitation onBack={back}/>}
      {view==='vi'         &&<VITimer onBack={back}/>}
      {view==='choiceboard'&&<ChoiceBoard {...props}/>}
      {view==='cards'      &&<CardDecks onBack={back} onNav={nav}/>}
      {view==='library'    &&<Library onBack={back}/>}
      {view==='timer'      &&<TimerTool onBack={back}/>}
      {view==='upload'     &&<MyPhotos {...props}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
